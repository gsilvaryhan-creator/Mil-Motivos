<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mil Motivos</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #000; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            width: 100vw;
            font-family: Arial, sans-serif;
        }
        /* Tela de Jogo na Vertical (Estilo Mobile Proporção 9:16) */
        #game-wrapper {
            width: 430px;
            height: 765px;
            position: relative;
            background: linear-gradient(135deg, #1e1e24 0%, #111115 100%);
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        /* Cenário de Fundo Cobrindo a Tela */
        .background {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            position: absolute;
            top: 0;
            left: 0;
            transition: background-image 0.5s ease;
            z-index: 1;
        }
        /* Tela Inicial do Menu */
        #menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 100px 30px;
            z-index: 10;
        }
        h1 {
            color: #ffffff;
            font-size: 50px;
            margin: 0;
            text-align: center;
            font-family: 'Georgia', serif;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.9);
            z-index: 2;
        }
        /* Botão Iniciar */
        #start-button {
            background-color: #ffcc00;
            color: #000000;
            border: 3px solid #ffffff;
            border-radius: 40px;
            padding: 15px 50px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0px 6px 12px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s, background-color 0.2s;
            z-index: 15;
            outline: none;
        }
        #start-button:active {
            transform: scale(0.95);
            background-color: #e6b800;
        }
        /* Personagens Lado a Lado na Tela Vertical */
        .sprite {
            position: absolute;
            bottom: 240px; /* Acima do balão de texto */
            height: 280px; /* Ajustado para caber no formato vertical */
            max-width: 180px;
            object-fit: contain;
            transition: all 0.3s ease;
            display: none;
            z-index: 3;
        }
        #left-sprite { left: 30px; }
        #right-sprite { right: 30px; }
        
        #menu-sofia {
            position: absolute;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            height: 300px;
            z-index: 2;
            pointer-events: none;
        }
        /* Efeitos Visuais de Foco */
        .active-speaker {
            filter: brightness(1) contrast(1);
            transform: scale(1.05);
        }
        .inactive-speaker {
            filter: brightness(0.4);
            transform: translateY(5px) scale(0.95);
        }
        /* Caixa de Diálogo Mobile (Fica na parte inferior) */
        #dialogue-container {
            position: absolute;
            bottom: 25px;
            left: 20px;
            right: 20px;
            height: 200px;
            background-color: rgba(0, 0, 0, 0.88);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 20px 25px;
            display: none;
            flex-direction: column;
            justify-content: flex-start;
            z-index: 20;
            cursor: pointer;
        }
        #name-tag {
            color: #ffcc00;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #dialogue-text {
            color: #ffffff;
            font-size: 18px;
            line-height: 1.4;
        }
        /* Estilo para ações indicadas por asteriscos */
        .action-text {
            color: #aaaaaa;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">

        let currentLine = 0;

        const bgLayer = document.getElementById('bg-layer');
        const menuScreen = document.getElementById('menu-screen');
        const menuSofia = document.getElementById('menu-sofia');
        const leftSprite = document.getElementById('left-sprite');
        const rightSprite = document.getElementById('right-sprite');
        const dialogueContainer = document.getElementById('dialogue-container');
        const nameTag = document.getElementById('name-tag');
        const dialogueText = document.getElementById('dialogue-text');
        const bgMusic = document.getElementById('bg-music');
        const wrapper = document.getElementById('game-wrapper');

        changeBackground('parte_fora.jpg');

        function changeBackground(url) {
            let img = new Image();
            img.src = url;
            img.onload = function() {
                bgLayer.style.backgroundImage = `url('${url}')`;
            };
            img.onerror = function() {
                bgLayer.style.backgroundImage = 'none';
            };
        }

        // Sistema Auto-Ajustável para Telas Verticais (Garante tamanho igual em qualquer celular)
        function resizeGame() {
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const scaleX = windowWidth / 430;
            const scaleY = windowHeight / 765;
            const scale = Math.min(scaleX, scaleY);
            wrapper.style.transform = `scale(${scale})`;
            wrapper.style.transformOrigin = 'center center';
        }
        window.addEventListener('resize', resizeGame);
        window.addEventListener('orientationchange', () => setTimeout(resizeGame, 200));
        resizeGame();

        function startGame() {
            menuScreen.style.display = 'none';
            menuSofia.style.display = 'none';
            dialogueContainer.style.display = 'flex';
            
            try {
                bgMusic.volume = 0.15;
                bgMusic.play();
            } catch(e) {}
            
            advanceStory();
        }

        function advanceStory() {
            if (currentLine >= story.length) {
                wrapper.style.transition = 'opacity 2s';
                wrapper.style.opacity = '0';
                return;
            }

            const data = story[currentLine];
            changeBackground(data.bg);

            if (data.left) {
                leftSprite.src = data.left;
                leftSprite.style.display = 'block';
            } else {
                leftSprite.style.display = 'none';
            }

            if (data.right) {
                rightSprite.src = data.right;
                rightSprite.style.display = 'block';
            } else {
                rightSprite.style.display = 'none';
            }

            // Sistema de Destaque Vertical Ativo/Inativo
            if (data.speaker === 'Sofia') {
                leftSprite.className = 'sprite active-speaker';
                rightSprite.className = 'sprite inactive-speaker';
            } else if (data.speaker === 'Narrador') {
                leftSprite.className = 'sprite';
                rightSprite.className = 'sprite';
            } else {
                leftSprite.className = 'sprite inactive-speaker';
                rightSprite.className = 'sprite active-speaker';
            }

            nameTag.innerText = data.speaker;
            
            // Renderização Inteligente das Ações Cinzas (entre asteriscos)
            if (data.text.startsWith('*') && data.text.endsWith('*')) {
                let cleanText = data.text.replace(/\*/g, '');
                dialogueText.innerHTML = `<span class="action-text">${cleanText}</span>`;
            } else {
                dialogueText.innerText = data.text;
            }

            currentLine++;
        }
    </script>
